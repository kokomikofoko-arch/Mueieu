<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓊆 ☁️ Sen's Magical Space ✨ 𓊇</title>
    <style>
        /* ☁️ พื้นหลังขาว-ฟ้าพาสเทล */
        body {
            margin: 0; padding: 0;
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #eef7ff 0%, #ffffff 50%, #e8f4fd 100%);
            color: #4a5a6a; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
            /* 🪄 เพิ่ม Custom Cursor */
            cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym46.cur'), auto;
        }

        /* 🪄 เอฟเฟกต์ตก (หิมะ/เมฆ/ดาว) */
        .snowflake { position: fixed; top: -10px; z-index: 9999; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* 🧼 การ์ดกระจกแก้ว */
        .card {
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 35px;
            padding: 40px 25px; width: 85%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 50px rgba(174, 214, 241, 0.25);
        }

        /* 🎶 ปุ่มเพลง */
        .music-btn {
            background: #fff; border: 2px solid #bcdbf8; padding: 10px 20px;
            border-radius: 50px; cursor: pointer; color: #5aa1e3; font-weight: bold;
            margin-bottom: 20px; transition: 0.3s;
        }
        .music-btn:hover { background: #eef7ff; }

        /* ส่วนประกอบอื่นยังคงดีไซน์เดิมที่คุณเซนชอบ */
        .header-icon { font-size: 64px; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        h2 { color: #5aa1e3; font-size: 24px; font-weight: 600; margin: 10px 0; }
        .subtitle { color: #8fa0b0; font-size: 13px; margin-bottom: 25px; }
        hr { border: 0; height: 1px; background: linear-gradient(to right, rgba(188, 227, 248, 0), rgba(188, 227, 248, 0.8), rgba(188, 227, 248, 0)); margin: 25px 0; }
        .btn { background: linear-gradient(135deg, #74b3e9 0%, #4b92db 100%); color: white; border: none; padding: 14px 35px; border-radius: 50px; cursor: pointer; transition: 0.3s; margin-top: 10px; text-decoration: none; display: inline-block; }
        .btn-line { background: linear-gradient(135deg, #6fdc8c 0%, #3ec260 100%); }
        .page { display: none; }
        .page.active { display: block; }
        .page-intro { text-align: center; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { margin: 10px 0; padding: 10px; background: rgba(255,255,255,0.5); border-radius: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <!-- 🎵 เครื่องเล่นเพลง -->
    <audio id="myAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <button class="music-btn" onclick="togglePlay()">🎶 Play / Pause BGM</button>

        <div id="page-intro" class="page page-intro active">
            <div class="header-icon">☁️</div>
            <h2>𓊆 Sen's Space 𓊇</h2>
            <button class="btn" onclick="showPage('page-1')"> 𓊆 Enter 𓊇 </button>
        </div>

        <div id="page-1" class="page">
            <h2>Profile</h2>
            <ul>
                <li>💬 <strong>Line :</strong> catminda</li>
                <li>🌙 เล่นเกมช่วงมืดๆ ไม่ดึกมาก</li>
            </ul>
            <button class="btn" onclick="showPage('page-2')">𓊆 Game IDs 𓊇</button>
        </div>

        <div id="page-2" class="page">
            <h2>Game IDs</h2>
            <a href="https://line.me/ti/p/~catminda" target="_blank" class="btn btn-line">𓊆 Add Line 𓊇</a>
            <br><br>
            <button class="btn" onclick="showPage('page-intro')">𓊆 Home 𓊇</button>
        </div>
    </div>

    <script>
        // 🪄 เอฟเฟกต์หิมะ/ดาว
        function createFall() {
            const span = document.createElement('span');
            span.innerHTML = Math.random() > 0.5 ? '☁️' : '✨';
            span.className = 'snowflake';
            span.style.left = Math.random() * 100 + 'vw';
            span.style.fontSize = Math.random() * 20 + 10 + 'px';
            span.style.animationDuration = Math.random() * 3 + 5 + 's';
            document.body.appendChild(span);
            setTimeout(() => span.remove(), 8000);
        }
        setInterval(createFall, 1000);

        // 🎵 ฟังก์ชันเพลง
        function togglePlay() {
            var audio = document.getElementById("myAudio");
            if (audio.paused) audio.play(); else audio.pause();
        }

        // 🪄 เปลี่ยนหน้า
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
